# ═══════════════════════════════════════════════════════════════════════════════
# رائد نيوم - Google Cloud Build Configuration
# ═══════════════════════════════════════════════════════════════════════════════

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom:${SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom:latest'
      - '.'
    id: 'build-image'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom'
    id: 'push-image'
    waitFor: ['build-image']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'raed-neom'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}'
      - '--set-env-vars'
      - 'OPENAI_API_KEY=${_OPENAI_API_KEY}'
    id: 'deploy-service'
    waitFor: ['push-image']

# Store images in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-academy/raed-neom:latest'

# Substitution variables
substitutions:
  _OPENROUTER_API_KEY: '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'
  _OPENAI_API_KEY: ''

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout
timeout: '1200s'
