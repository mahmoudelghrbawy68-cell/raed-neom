# ═══════════════════════════════════════════════════════════════════════════════
# رائد نيوم - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # المحرك (Backend Engine)
  # ═══════════════════════════════════════════════════════════════════════════
  engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile
    container_name: raed-neom-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-}
      - CORE_LICENSE=${CORE_LICENSE:-raed-neom-production-2025}
      - PORT=8000
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=http://localhost:3000,https://raed-neom.vercel.app
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - neom-network
    volumes:
      - engine-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════════════
  # الواجهة (Frontend Gateway)
  # ═══════════════════════════════════════════════════════════════════════════
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: raed-neom-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://engine:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      engine:
        condition: service_healthy
    networks:
      - neom-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════════════════
  # قاعدة البيانات (PostgreSQL)
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: raed-neom-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=raed
      - POSTGRES_PASSWORD=${DB_PASSWORD:-raed_neom_2025}
      - POSTGRES_DB=raed_neom
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - neom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raed -d raed_neom"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis للكاش
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: raed-neom-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - neom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  neom-network:
    driver: bridge

volumes:
  engine-logs:
  postgres-data:
  redis-data:
